name: Bug report
description: Report something broken in Jasper Media Player
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so it can be reproduced.

  - type: input
    id: version
    attributes:
      label: App version
      description: Release version or commit hash.
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 25H2
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra info
      description: Screenshots, logs, video URLs, or anything else useful.
    validations:
      required: false
