name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\src\JasperMediaPlayer.csproj

      - name: Build
        run: dotnet build .\src\JasperMediaPlayer.csproj -c Release -r win-x64 --no-restore

      - name: Publish folder
        run: dotnet publish .\src\JasperMediaPlayer.csproj -c Release -r win-x64 --self-contained false -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -o .\artifacts\JasperMediaPlayer-win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JasperMediaPlayer-win-x64
          path: .\artifacts\JasperMediaPlayer-win-x64
